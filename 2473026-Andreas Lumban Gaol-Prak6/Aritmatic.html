<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> 2473026 - Andreas Lumban Gaol </title>
        <link rel="stylesheet" href="Aritmatic.css">
    </head>
    <body>
       <div class="container">
            <label for="angka1">Angka Pertama : </label>
            <input type="text" id="angka1"><br>
            <label for="angka2">Angka Kedua : </label>
            <input type="text" id="angka2"><br>
            <button onclick="count()">Count</button> <br>
            <table>
                <tr>
                    <td id="a1"></td>
                    <td>+</td>
                    <td id="a2"></td>
                    <td>=</td>
                    <td id="hasil_tambah"></td>
                </tr>
                <tr>
                    <td id="a3"></td>
                    <td>-</td>
                    <td id="a4"></td>
                    <td>=</td>
                    <td id="hasil_kurang"></td>
                </tr>
            </table>
       </div> 

       <script>
        function count(){
            var x = document.getElementById("angka1").value;
            var y = document.getElementById("angka2").value;

            var cek1= isNaN(x) || x === "";
            var cek2= isNaN(y) || y === "";

            if(cek1 && cek2){
                alert("angka pertama dan kedua harus angka.")
                return;
            }else if(cek1){
                alert("angka pertama harus angka.")
                return;
            }else if(cek2){
                alert("angka kedua harus angka.")
                return;
            }
            var a = parseInt(x);
            var b = parseInt(y);
            var hasiltambah = a + b;
            var hasilkurang = a - b;

            document.getElementById("a1").innerHTML = a;
            document.getElementById("a2").innerHTML = b;
            document.getElementById("hasil_tambah").innerHTML = hasiltambah;

            document.getElementById("a3").innerHTML = a;
            document.getElementById("a4").innerHTML = b;  
            document.getElementById("hasil_kurang").innerHTML = hasilkurang;
        }
       </script>
    </body>
</html>
