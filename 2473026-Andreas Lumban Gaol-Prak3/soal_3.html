<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> 2473026 - Andreas Lumban Gaol </title>
    </head>
    <body>
        <form 
        onsubmit="alert('Data berhasil ditambahkan.')">
        <table style="border: 2px solid black" align="center">
            <tr>
                <td colspan="3" align="left">
                    <h1>Form Tambah Data User</h1>
                </td>
            </tr>
            <tr>
                <td>
                    Name
                </td>
                <td>
                    <input type="text" name="Name" size="25" value=""
                    required
                    oninvalid="this.setCustomValidity('Name is required!!!')"
                    oninput="this.setCustomValidity('')">
                </td>
            </tr>
            <tr>
                <td>
                    Address
                </td>
                <td>
                    <input type="text" name="Address" size="25" value=""
                    required
                    oninvalid="this.setCustomValidity('Address is required!!!')"
                    oninput="this.setCustomValidity('')">
                </td>
            </tr>
                    <td>
                        Email
                    </td>
                    <td>
                        <input type="email" name="Email" size="25" value=""
                        required
                        oninvalid="this.setCustomValidity('Harap isi bidang ini.')"
                        oninput="this.setCustomValidity('')">
                </tr>
                <tr>
                    <td>
                        Home Page
                    </td>
                    <td>
                        <input type="url" name="Home Page" size="25" value="">
                </tr>
                <tr>
                    <td>
                        Birthday
                    </td>
                    <td>
                        <input type="date" name="Birthday" size="25" value="">
                        </td>
                </tr>
                <tr>
                    <td>
                        Favorite Color
                    </td>
                    <td>
                        <input type="color" name="Favorite Color" size="25" value="#000000">    
                        </td>
                </tr>
                <tr>
                    <td>
                        IPK
                    </td>
                    <td>
                        <input type="number" name="IPK" value="0" size="5"
                        min="0" max="4" step="0.1">
                </tr>
                <tr>
                    <td>
                        Phone Number
                    </td>
                    <td>
                        <input type="tel" name="Phone Number" size="10" value=""
                        pattern="[0-9]{3}-[0-9]{7,10}"
                        placeholder="###-#######">
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td >
                        <button type="submit">Add</button>
                    </td>
                </tr>
            </tr>
        </table>
        </form>
    </body>
</html>
