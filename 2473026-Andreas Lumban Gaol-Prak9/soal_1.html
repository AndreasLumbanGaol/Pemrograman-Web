<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> 2473026 - Andreas Lumban Gaol </title>
        <script src="jquery-4.0.0.min.js"></script>
        <style>
            ol.main{
                list-style-type: none;
                display: flex;
                padding: 0;
                margin: 0;
                color: white;
                text-align: left;
            }
            li.item{
                margin-right: 10px;
                padding: 5px 5px;
                background-color: #FF1493;
                text-decoration: underline;
                position: relative;
                width: 140px;
            }
            ol.sub-menu {
                position: absolute;
                top: 100%;
                left: 0;
                width: 150px;            
                box-sizing: border-box;  
                list-style-type: none;
                padding: 0;
                margin: 0;
                background-color: white;
                color: black;
                border: 2px solid #FF1493;
                text-decoration: underline;

                
            }

            ol.sub-menu li {
                padding: 5px;
                text-align: left;
            }

        </style>
        <script>
            $(document).ready(function(){
                $("li.item ol").hide();

                $("li.item").hover(function(){
                    $(this).find("ol").stop().show();
                }, function(){
                    $(this).find("ol").stop().hide();
                }
                )
            })
        </script>
    </head>
    <body>
        <ol class="main">
            <li class="item">
                jQuery
                <ol class="sub-menu">
                    <li>Download</li>
                    <li>Documentation</li>
                    <li>Blog</li>
                </ol>
            </li>
            <li class="item">
                Community
                <ol class="sub-menu">
                    <li>Mailing List</li>
                    <li>Tutorials</li>
                    <li>Demos</li>
                    <li>Plugins</li>
                </ol>
            </li>
            <li class="item">Development
                <ol class="sub-menu">
                    <li>Source Code</li>
                    <li>Bug Tracking</li>
                    <li>Recent Changes</li>
                </ol>
            </li>
        </ol>
    </body>
</html>
