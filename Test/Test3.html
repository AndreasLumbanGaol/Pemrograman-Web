<html>
<head>
    <title>Halaman Auto-Redirect</title>
    <meta http-equiv="refresh" content="5; URL=https://www.google.com">
</head>
<body>
    <h2>Latihan Hyperlink dan Meta</h2>
    <p>Halaman ini akan otomatis berpindah ke Google dalam 5 detik.</p>
    
    <p>Atau klik link ini untuk pindah ke tab baru secara manual:</p>
    <a href="https://www.google.com" target="_blank">Buka Google di Tab Baru</a>
</body>
</html>
