<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator Pasar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }

        .container {
            width: 260px;
            margin: 50px auto;
            padding: 20px;
            background: #e6e6e6;
            border-radius: 12px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .display {
            width: 100%;
            height: 50px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            text-align: right;
            font-size: 20px;
            padding: 5px 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        .number {
            background: #4CAF50;
            color: white;
        }

        .operator {
            background: #f0a23b;
            color: white;
        }

        .equal {
            background: #1976d2;
            color: white;
        }

        .clear {
            margin-top: 10px;
            width: 100%;
            background: #d9534f;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <input type="text" id="display" class="display" disabled>

    <div class="buttons">
        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('*')">×</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="operator" onclick="append('-')">−</button>

        <button class="number" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
        <button class="operator" onclick="append('+')">+</button>
    </div>

    <button class="clear" onclick="clearDisplay()">C</button>
</div>

<script>
    const display = document.getElementById("display");

    function append(value) {
        display.value += value;
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = "Error";
        }
    }

    function clearDisplay() {
        display.value = "";
    }
</script>

</body>
</html>
